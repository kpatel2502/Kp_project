<!DOCTYPE html>
<html>
<head>
<title>Task Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<h1 class="text-center mb-4">Task Manager</h1>

<div class="row text-center mb-4">

<div class="col">
<div class="card bg-primary text-white p-3">
Total Tasks: {{total}}
</div>
</div>

<div class="col">
<div class="card bg-success text-white p-3">
Completed: {{completed}}
</div>
</div>

<div class="col">
<div class="card bg-warning text-dark p-3">
Pending: {{pending}}
</div>
</div>

</div>

<form action="/add" method="POST">

<div class="input-group mb-4">

<input type="text" name="title" class="form-control" placeholder="Enter task..." required>

<button class="btn btn-success">
Add Task
</button>

</div>

</form>

<ul class="list-group">

{% for task in tasks %}

<li class="list-group-item d-flex justify-content-between align-items-center">

{% if task[2] == 1 %}
<span class="text-decoration-line-through">{{task[1]}}</span>
{% else %}
<span>{{task[1]}}</span>
{% endif %}

<div>

<a href="/complete/{{task[0]}}" class="btn btn-sm btn-success">
Complete
</a>

<a href="/delete/{{task[0]}}" class="btn btn-sm btn-danger">
Delete
</a>

</div>

</li>

{% endfor %}

</ul>

</div>

</body>
</html>
